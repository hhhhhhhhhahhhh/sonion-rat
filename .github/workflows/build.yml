name: Build Sonion APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo-dev cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Accept Android SDK Licenses
      run: |
        # SDK manager'ı bul
        SDKMANAGER=$(find $ANDROID_SDK_ROOT -name "sdkmanager" 2>/dev/null | head -1)
        if [ -z "$SDKMANAGER" ]; then
          echo "sdkmanager not found, installing..."
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
        else
          yes | $SDKMANAGER --licenses || true
        fi

    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug deploy

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sonion-rat
        path: bin/*.apk

    - name: Upload APK to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
